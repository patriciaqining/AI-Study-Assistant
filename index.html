<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Study Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            margin-top: 10px;
            margin-right: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #answer {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            background-color: #f8f8f8;
            line-height: 1.5;
            max-height: 500px;
            overflow-y: auto;
        }

        #status {
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <h1>📚 AI Study Assistant</h1>

    <p>Ask any study question:</p>

    <textarea
        id="question"
        placeholder="What is virtual memory?"></textarea>

    <br>

    <button onclick="askQuestion()">
        Ask AI
    </button>

    <button onclick="startVoiceInput()">
        🎤 Speak Question
    </button>

    <button onclick="readAnswer()">
        🔊 Read Answer
    </button>

    <button onclick="stopReading()">
        ⏹ Stop Reading
    </button>

    <p id="status"></p>

    <h2>Answer</h2>

    <div id="answer">
        Waiting for question...
    </div>

    <script>
        async function askQuestion() {

            const question =
                document.getElementById("question").value.trim();

            if (!question) {
                document.getElementById("answer").innerText =
                    "Please enter a question.";
                return;
            }

            document.getElementById("answer").innerText =
                "Thinking...";

            document.getElementById("status").innerText =
                "Sending question to Gemini...";

            try {

                const response = await fetch(
                    "https://study-assistant-256684175490.us-central1.run.app",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            question: question
                        })
                    }
                );

                const data = await response.json();

                console.log("Response:", data);

                if (data.answer) {
                    document.getElementById("answer").innerText =
                        data.answer;

                    document.getElementById("status").innerText =
                        "Answer generated successfully.";
                } else {
                    document.getElementById("answer").innerText =
                        JSON.stringify(data, null, 2);

                    document.getElementById("status").innerText =
                        "Response received, but no answer field was found.";
                }

            } catch (error) {

                console.error(error);

                document.getElementById("answer").innerText =
                    "ERROR: " + error;

                document.getElementById("status").innerText =
                    "Something went wrong.";
            }
        }

        function startVoiceInput() {

            const SpeechRecognition =
                window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                document.getElementById("status").innerText =
                    "Speech recognition is not supported in this browser.";
                return;
            }

            const recognition = new SpeechRecognition();

            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            document.getElementById("status").innerText =
                "Listening... please speak your question.";

            recognition.start();

            recognition.onresult = function(event) {

                const transcript =
                    event.results[0][0].transcript;

                document.getElementById("question").value =
                    transcript;

                document.getElementById("status").innerText =
                    "Voice input captured. Click Ask AI to submit.";
            };

            recognition.onerror = function(event) {

                document.getElementById("status").innerText =
                    "Voice input error: " + event.error;
            };

            recognition.onend = function() {
                console.log("Voice recognition ended.");
            };
        }

        function readAnswer() {

            const answer =
                document.getElementById("answer").innerText;

            if (!answer || answer === "Waiting for question...") {
                document.getElementById("status").innerText =
                    "There is no answer to read yet.";
                return;
            }

            speechSynthesis.cancel();

            const speech =
                new SpeechSynthesisUtterance(answer);

            speech.lang = "en-US";
            speech.rate = 1;
            speech.pitch = 1;

            speechSynthesis.speak(speech);

            document.getElementById("status").innerText =
                "Reading answer aloud...";
        }

        function stopReading() {
            speechSynthesis.cancel();

            document.getElementById("status").innerText =
                "Reading stopped.";
        }
    </script>

</body>

</html>
